version: "3.9"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: psql
      POSTGRES_PASSWORD: "Akash!2345"
      POSTGRES_DB: airbnb_production
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: ./bin/thrust ./bin/rails server
    ports:
      - "80:80"
    depends_on:
      - db
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: your_master_key_here
      POSTGRES_USER: psql
      POSTGRES_PASSWORD: "Akash!2345"
      POSTGRES_HOST: db

volumes:
  postgres_data: